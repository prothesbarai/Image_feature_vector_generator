<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIP Image Vector Tool</title>
</head>

<body>
    <h2>Upload Image</h2> 
    <input type="file" id="fileInput" />
    <button onclick="uploadImage()">Get Vector</button>
    <pre id="output"></pre> <button onclick="copyVector()">Copy Vector</button>

    <script> 
    let currentVector = []; async function uploadImage() { const file = document.getElementById("fileInput").files[0]; let formData = new FormData(); formData.append("file", file); let res = await fetch("http://127.0.0.1:8000/embed", { method: "POST", body: formData }); let data = await res.json(); currentVector = data.vector; document.getElementById("output").innerText = JSON.stringify(data.vector, null, 2); } function copyVector() { navigator.clipboard.writeText(JSON.stringify(currentVector)); alert("Copied!"); } 
    </script>
</body>
</html>
