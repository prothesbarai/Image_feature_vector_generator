<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIP Image Vector Tool</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 30px;
            background: #f5f5f5;
        }

        h2 {
            color: #333;
        }

        input, button {
            margin: 10px;
            padding: 10px;
        }

        button {
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        pre {
            text-align: left;
            background: #222;
            color: #0f0;
            padding: 15px;
            overflow: auto;
            max-height: 300px;
        }
    </style>
</head>

<body>

    <h2>Upload Image & Get Vector 🚀</h2>

    <input type="file" id="fileInput" accept="image/*" />
    <br>

    <button onclick="uploadImage()">Get Vector</button>
    <button onclick="copyVector()">Copy Vector</button>

    <h3>Output:</h3>
    <pre id="output">No data yet...</pre>

    <script>
        let currentVector = [];

        async function uploadImage() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select an image!");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            try {
                document.getElementById("output").innerText = "Processing... ⏳";

                const response = await fetch("https://image-feature-vector-generator.onrender.com/embed-image", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    document.getElementById("output").innerText = data.error;
                    return;
                }

                currentVector = data.embedding;

                document.getElementById("output").innerText =
                    JSON.stringify(data.embedding, null, 2);

            } catch (error) {
                console.error(error);
                document.getElementById("output").innerText =
                    "Error: " + error.message;
            }
        }

        function copyVector() {
            if (currentVector.length === 0) {
                alert("No vector to copy!");
                return;
            }

            navigator.clipboard.writeText(JSON.stringify(currentVector));
            alert("Vector copied! ✅");
        }
    </script>

</body>
</html>
